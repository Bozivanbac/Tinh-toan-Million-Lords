<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Million Lords - Công Cụ Tính Quân</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #060913;
            background-image: radial-gradient(circle at 50% 50%, #0d1527 0%, #060913 100%);
        }
        .game-input {
            background-color: #0b111e;
            border: 2px solid #1e2d4a;
            color: #ffffff;
            transition: all 0.2s ease;
        }
        .game-input:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
            outline: none;
        }
        .game-select {
            background-color: #0b111e;
            border: 2px solid #1e2d4a;
            color: #f59e0b;
            font-weight: bold;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-3 md:p-6">

    <div class="w-full max-w-3xl bg-[#0e1626] border-2 border-[#1e2d4a] rounded-3xl shadow-2xl overflow-hidden p-4 md:p-6">
        
        <div class="text-center pb-4 border-b border-[#1f2d47] mb-5">
            <h1 class="text-lg md:text-xl font-black text-amber-500 tracking-wide uppercase flex items-center justify-center gap-2">
                <span class="material-icons text-amber-500">bolt</span>
                MILLION LORDS - ĐỐI CHIẾU LỰC LƯỢNG
            </h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mb-5">
            
            <div class="bg-[#131f37] border border-[#233557] rounded-2xl p-4 flex flex-col justify-between">
                <div>
                    <h3 class="text-xs font-extrabold text-blue-400 uppercase tracking-wider mb-4 flex items-center gap-1.5 border-b border-[#1f2d47] pb-2">
                        <span class="material-icons text-sm">person</span> THÔNG SỐ CỦA BẠN
                    </h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[11px] uppercase font-bold text-gray-400 mb-1.5">Lính bạn hiện có</label>
                            <div class="flex gap-2">
                                <input type="number" id="myTroops" value="11.2" step="0.1" min="0" class="w-full p-2.5 rounded-lg game-input font-bold text-base text-center" oninput="runCalculation()">
                                <select id="myTroopsUnit" class="p-2 rounded-lg game-select text-sm cursor-pointer" onchange="runCalculation()">
                                    <option value="T">T</option>
                                    <option value="G" selected>G</option>
                                    <option value="M">M</option>
                                    <option value="K">K</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[11px] uppercase font-bold text-gray-400 mb-1.5">Striker của bạn (Attack %)</label>
                            <input type="number" id="myAtk" value="50" min="0" max="1000" class="w-full p-2.5 rounded-lg game-input font-bold text-base text-center" oninput="runCalculation()">
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-[#131f37] border border-[#233557] rounded-2xl p-4">
                <h3 class="text-xs font-extrabold text-red-400 uppercase tracking-wider mb-4 flex items-center gap-1.5 border-b border-[#1f2d47] pb-2">
                    <span class="material-icons text-sm">shield</span> THÔNG SỐ THÀNH ĐỊCH
                </h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-[11px] uppercase font-bold text-gray-400 mb-1.5">Cấp thành phố</label>
                        <input type="number" id="cityLevel" value="116" min="1" max="500" class="w-full p-2.5 rounded-lg game-input font-bold text-base text-center text-amber-500" oninput="updateDefaultDef()">
                    </div>

                    <div>
                        <label class="block text-[11px] uppercase font-bold text-gray-400 mb-1.5">Số tổng lính địch</label>
                        <div class="flex gap-2">
                            <input type="number" id="enemyTroops" value="972" min="0" class="w-full p-2.5 rounded-lg game-input font-bold text-base text-center" oninput="runCalculation()">
                            <select id="enemyTroopsUnit" class="p-2 rounded-lg game-select text-sm cursor-pointer" onchange="runCalculation()">
                                <option value="T">T</option>
                                <option value="G">G</option>
                                <option value="M" selected>M</option>
                                <option value="K">K</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] uppercase font-bold text-gray-400 mb-1.5">Defense của địch (%)</label>
                        <input type="number" id="enemyDef" value="348" min="0" class="w-full p-2.5 rounded-lg game-input font-bold text-base text-center" oninput="runCalculation()">
                    </div>
                </div>
            </div>

        </div>

        <div class="mt-6 border-t-2 border-[#1f2d47] pt-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-stretch">
                <div class="md:col-span-2 flex">
                    <div id="statusCard" class="w-full rounded-2xl p-5 flex flex-col justify-center items-center text-center transition-all duration-300">
                        <div class="flex items-center justify-center gap-2 mb-1">
                            <span id="statusIcon" class="material-icons text-3xl"></span>
                            <span id="statusTitle" class="text-base font-black uppercase tracking-wide">ĐANG TÍNH...</span>
                        </div>
                        <div id="statusDesc" class="text-xs font-semibold opacity-95"></div>
                    </div>
                </div>

                <div class="bg-[#090e1a] rounded-xl border border-[#1e2d4a] p-3 text-xs space-y-2 flex flex-col justify-center">
                    <div class="flex justify-between text-gray-400">
                        <span>Sức công của bạn:</span>
                        <span id="myAttackPower" class="text-blue-400 font-bold">--</span>
                    </div>
                    <div class="flex justify-between text-gray-400 border-t border-[#1e2d4a]/50 pt-1.5">
                        <span>Ước tính Est. Def:</span>
                        <span id="calculatedEstDef" class="text-amber-500 font-bold">--</span>
                    </div>
                    <div class="flex justify-between text-gray-400 border-t border-[#1e2d4a]/50 pt-1.5">
                        <span>Quân an toàn cần mang:</span>
                        <span id="safeRequired" class="text-emerald-400 font-black text-sm">--</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function updateDefaultDef() {
            const cityLevel = parseInt(document.getElementById('cityLevel').value) || 0;
            document.getElementById('enemyDef').value = cityLevel * 3;
            runCalculation();
        }

        function parseValueWithUnit(val, unit) {
            const num = parseFloat(val) || 0;
            switch (unit) {
                case 'T': return num * 1e12;
                case 'G': return num * 1e9;
                case 'M': return num * 1e6;
                case 'K': return num * 1e3;
                default: return num;
            }
        }

        function formatGameValue(val) {
            if (val >= 1e12) return (val / 1e12).toFixed(2) + "T";
            if (val >= 1e9) return (val / 1e9).toFixed(2) + "G";
            if (val >= 1e6) return (val / 1e6).toFixed(2) + "M";
            if (val >= 1e3) return (val / 1e3).toFixed(2) + "K";
            return Math.round(val).toLocaleString('vi-VN');
        }

        function runCalculation() {
            const myTroopsRaw = parseValueWithUnit(document.getElementById('myTroops').value, document.getElementById('myTroopsUnit').value);
            const myAtk = parseFloat(document.getElementById('myAtk').value) || 0;
            const atkMultiplier = 1 + (myAtk / 100);

            const cityLevel = parseInt(document.getElementById('cityLevel').value) || 1;
            const enemyTroopsRaw = parseValueWithUnit(document.getElementById('enemyTroops').value, document.getElementById('enemyTroopsUnit').value);
            const enemyDef = parseFloat(document.getElementById('enemyDef').value) || 0;

            const estimatedWallHp = 89.3e9 * Math.pow(cityLevel / 116, 2.5);
            const totalEnemyEstDef = estimatedWallHp + (enemyTroopsRaw * (1 + (enemyDef / 100)));
            document.getElementById('calculatedEstDef').innerText = formatGameValue(totalEnemyEstDef);

            const myAttackPowerRaw = myTroopsRaw * atkMultiplier;
            document.getElementById('myAttackPower').innerText = formatGameValue(myAttackPowerRaw);

            const safeRequiredTroops = Math.ceil((totalEnemyEstDef / atkMultiplier) * 1.02);
            document.getElementById('safeRequired').innerText = formatGameValue(safeRequiredTroops);

            const statusCard = document.getElementById('statusCard');
            const statusIcon = document.getElementById('statusIcon');
            const statusTitle = document.getElementById('statusTitle');
            const statusDesc = document.getElementById('statusDesc');

            if (myTroopsRaw >= safeRequiredTroops) {
                statusCard.className = "w-full rounded-2xl p-5 flex flex-col justify-center items-center text-center bg-emerald-950/70 border-2 border-emerald-500 text-emerald-400 shadow-lg";
                statusIcon.innerText = "check_circle";
                statusTitle.innerText = "ĐỦ LÍNH CHIẾM THÀNH!";
                statusDesc.innerText = `Lính còn dư sau trận chiến: +${formatGameValue(myTroopsRaw - safeRequiredTroops)}`;
            } else {
                statusCard.className = "w-full rounded-2xl p-5 flex flex-col justify-center items-center text-center bg-rose-950/70 border-2 border-rose-500 text-rose-400 shadow-lg";
                statusIcon.innerText = "error";
                statusTitle.innerText = "THIẾU QUÂN - KHÔNG THỂ CHIẾM!";
                statusDesc.innerText = `Cần tích lũy thêm ít nhất: -${formatGameValue(safeRequiredTroops - myTroopsRaw)} lính`;
            }
        }

        window.onload = runCalculation;
    </script>
</body>
</html>
